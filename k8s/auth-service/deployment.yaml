apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: techdilshan/auth-service:latest
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
          # You can add other environment variables if your service needs them (ex: DB URL, JWT secret, etc.)

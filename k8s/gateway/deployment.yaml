apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: techdilshan/gateway:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            - name: DELIVERY_SERVICE_URL
              value: "http://delivery-service:5003"
            - name: RESTAURENT_SERVICE_URL
              value: "http://restaurent-service:5006"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:5007"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:5004"
